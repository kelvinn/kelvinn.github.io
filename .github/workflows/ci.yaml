name: CI (Non-Main Branches)

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt

      - name: Run linter
        run: |
          python -m ruff check src/ .github/scripts/ --output-format=github

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt

      - name: Run tests
        run: |
          set +e
          PYTHONPATH=. python -m pytest tests/ -v --tb=short
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No tests were collected; treating this as a successful smoke check."
            exit 0
          fi
          exit "$status"
