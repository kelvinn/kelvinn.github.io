# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  pull_request:
    branches:
      - main

  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Los_Angeles
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  html-validation:
    name: HTML Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.164.0/hugo_extended_0.164.0_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build site
        run: hugo --gc --minify

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate HTML
        run: |
          pip install html5lib
          python - <<'PY'
          import html5lib
          import sys
          from pathlib import Path

          errors = []
          for html_file in sorted(Path("public").rglob("*.html")):
              try:
                  with open(html_file, "rb") as f:
                      html5lib.parse(f)
              except Exception as e:
                  errors.append(f"{html_file.relative_to('public')}: {e}")

          if errors:
              print("HTML validation errors found:")
              for err in errors[:20]:
                  print(f"  - {err}")
              if len(errors) > 20:
                  print(f"  ... and {len(errors) - 20} more")
              sys.exit(1)
          else:
              print("All HTML files are valid")
          PY

  link-check:
    name: Internal Link Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.164.0/hugo_extended_0.164.0_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build site
        run: hugo --gc --minify

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for broken internal links
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          broken_links = []

          html_files = list(Path("public").rglob("*.html"))

          for html_file in html_files:
              with open(html_file, "r", encoding="utf-8") as f:
                  content = f.read()

              links = re.findall(r'href=["\']([^"\']*)["\']', content)

              for link in links:
                  if link.startswith(("http", "mailto:", "tel:", "#", "javascript:")):
                      continue

                  if link.startswith("/"):
                      expected_path = Path("public") / link.lstrip("/")
                      if not expected_path.exists() and not expected_path.with_suffix(".html").exists():
                          broken_links.append(f"{html_file.relative_to('public')}: {link}")
                  else:
                      link_path = (html_file.parent / link).resolve()
                      try:
                          link_path.relative_to(Path("public").resolve())
                          if not link_path.exists() and not link_path.with_suffix(".html").exists():
                              broken_links.append(f"{html_file.relative_to('public')}: {link}")
                      except ValueError:
                          pass

          if broken_links:
              print("Broken internal links found:")
              for link in broken_links[:20]:
                  print(f"  - {link}")
              if len(broken_links) > 20:
                  print(f"  ... and {len(broken_links) - 20} more")
              sys.exit(1)
          else:
              print("All internal links are valid")
          PY

  image-check:
    name: Image Alt Text Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.164.0/hugo_extended_0.164.0_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build site
        run: hugo --gc --minify

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for missing alt text
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          missing_alt = []

          for html_file in Path("public").rglob("*.html"):
              with open(html_file, "r", encoding="utf-8") as f:
                  content = f.read()

              img_tags = re.findall(r"<img([^>]*)>", content, re.IGNORECASE)

              for img in img_tags:
                  if 'class="image' in img or "figure" in img:
                      continue

                  if "alt=" not in img.lower():
                      missing_alt.append(f"{html_file.relative_to('public')}: {img[:100]}")

          if missing_alt:
              print("Images missing alt text:")
              for img in missing_alt[:20]:
                  print(f"  - {img}")
              if len(missing_alt) > 20:
                  print(f"  ... and {len(missing_alt) - 20} more")
              sys.exit(1)
          else:
              print("All images have alt text")
          PY

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install --global markdownlint-cli

      - name: Lint Markdown files
        run: |
          # Ignore certain rules that are too strict for personal blogs
          markdownlint content/ \
            --config .markdownlint.json \
            --ignore content/posts/20NN*

  # Deployment job
  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build
      - html-validation
      - link-check
      - image-check
      - markdown-lint
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
